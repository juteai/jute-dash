name: CI Build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Unit tests
        run: go list ./... | grep -v '/apps/web/node_modules/' | xargs go test -count=1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Web lint
        working-directory: apps/web
        run: npm run lint

      - name: Web format check
        working-directory: apps/web
        run: npm run format:check

      - name: Web check
        working-directory: apps/web
        run: npm run check

      - name: Web tests
        working-directory: apps/web
        run: npm run test:coverage

      - name: Web build
        working-directory: apps/web
        run: npm run build
