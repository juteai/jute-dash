name: CI Tag
on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Bumps version, creates tag, and creates a GitHub Release
      - name: Bump version and create release tag
        uses: mathieudutour/github-tag-action@v6.2
        id: tag
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: patch
          tag_prefix: "v"

      - name: Show created tag
        run: |
          echo "new_tag=${{ steps.tag.outputs.new_tag }}"
          echo "changelog=${{ steps.tag.outputs.changelog }}"

  # Pushes from workflows using GITHUB_TOKEN do not trigger other workflows, so tag
  # pushes from the job above never fire ci-release.yaml. Run GoReleaser here instead.
  goreleaser:
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Release tag parts
        id: version
        run: |
          tag="${{ needs.tag.outputs.new_tag }}"
          version="${tag#v}"
          major="${version%%.*}"
          minor_patch="${version#*.}"
          minor="${minor_patch%%.*}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      - name: Build and publish release image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.tag.outputs.new_tag }}
          tags: |
            ghcr.io/juteai/jute-dash:${{ needs.tag.outputs.new_tag }}
            ghcr.io/juteai/jute-dash:${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
            ghcr.io/juteai/jute-dash:${{ steps.version.outputs.major }}
            ghcr.io/juteai/jute-dash:latest
