version: 2

before:
  hooks:
    - npm --prefix apps/web ci
    - npm --prefix apps/web run build

builds:
  - id: juted-linux-amd64
    main: ./apps/hub/cmd/juted
    binary: juted
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - ids:
      - juted-linux-amd64
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

source:
  enabled: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
