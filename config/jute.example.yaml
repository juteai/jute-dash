home:
  name: Jute House
  timezone: Europe/London
  locale: en-GB

server:
  listen-address: 127.0.0.1:8787

mcp:
  enabled: false
  transport: streamable-http
  listen-address: 127.0.0.1:8790
  path: /mcp
  allow-lan: false
  auth:
    mode: local-token
    env-token: JUTE_MCP_TOKEN

display:
  theme: system
  accent-color: teal
  idle-mode: ambient

weather:
  enabled: true
  provider: open-meteo
  location-name: London
  latitude: 51.5072
  longitude: -0.1276
  temperature-unit: celsius
  wind-speed-unit: kmh

voice:
  enabled: false
  muted-by-default: true
  wake-word-model-id: ""
  stt-provider-id: ""
  tts-provider-id: ""
  stt-model-id: ""
  tts-model-id: ""
  tts-voice-id: ""
  preferred-agent-id: ""
  cloud-opt-in: false
  command-providers-enabled: false
  sensitive-output-policy: visual_only_sensitive
  followup-window-seconds: 8
  microphone-profile: ""

agents:
  - id: house-concierge
    name: House Concierge
    description: General household assistant for summaries, reminders, and routing requests.
    card-url: https://agent.example.com/.well-known/agent-card.json
    endpoint-url: https://agent.example.com/a2a/v1
    protocol-binding: JSONRPC
    enabled: true
    capabilities:
      - conversation
      - home-summary
      - reminders
    auth:
      type: bearer
      env-token: JUTE_HOUSE_CONCIERGE_TOKEN
  - id: energy-watch
    name: Energy Watch
    description: Tracks household energy usage and suggests low-friction savings.
    card-url: https://energy.example.com/.well-known/agent-card.json
    endpoint-url: https://energy.example.com/a2a/v1
    protocol-binding: JSONRPC
    enabled: false
    capabilities:
      - energy
      - forecasting

rooms:
  - id: kitchen
    name: Kitchen
    summary: Comfortable
    status: ok
  - id: living-room
    name: Living Room
    summary: Lights on
    status: active
  - id: studio
    name: Studio
    summary: Quiet mode
    status: muted

tiles:
  - id: climate
    kind: climate
    label: Climate
    value: 21.5 C
    detail: Heating idle
  - id: lights
    kind: lighting
    label: Lights
    value: 6 on
    detail: Evening scene
  - id: security
    kind: security
    label: Security
    value: Armed home
    detail: All doors closed
  - id: network
    kind: network
    label: Network
    value: Online
    detail: 42 devices
