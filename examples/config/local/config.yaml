home:
    name: Jute Local Dev
server:
    listen-address: 127.0.0.1:8787
log:
    level: info
    file-path: ""
    max-size: 10
    max-backups: 5
    max-age: 3
    compress: true
mcp:
    enabled: true
    transport: streamable-http
    listen-address: 127.0.0.1:8790
    path: /mcp
    allow-lan: false
    auth:
        mode: none
        env-token: JUTE_MCP_TOKEN
a2a:
    allowed-agent-card-urls: []
    allow-loopback: true
display:
    theme: system
    color-mode: system
    theme-id: jute-mono
    density: comfortable
    motion: full
    background:
        kind: dynamic
        value: weather-ambient
        fit: cover
        position: center
        overlay: none
        properties:
            max-opacity: 0.25
            speed: 0.4
    widget-chrome:
        default: smoked
        smoked-opacity: 0.35
    accent-color: neutral
    idle-mode: ambient
voice:
    enabled: true
    muted-by-default: false
    wake-word-model-id: hey_jarvis
    wake-word-phrase: hey jarvis
    wake-sensitivity: 0.5
    stt-provider-id: local-whisper-stt
    tts-provider-id: local-piper-tts
    stt-model-id: tiny.en
    tts-model-id: piper-default
    tts-voice-id: piper-default
    tts-enabled: true
    tts-locale: en
    tts-speed: 1
    tts-volume: 1
    preferred-agent-id: kronk-agent
    cloud-opt-in: false
    command-providers-enabled: true
    sensitive-output-policy: visual_only_sensitive
    followup-window-seconds: 8
    microphone-profile: ""
    capture-command: /bin/sh
    capture-args:
        - ../../examples/config/local/dev-voice-provider.sh
        - capture
    capture-sample-rate: 16000
    capture-channels: 1
    capture-sample-width: 2
    capture-frame-ms: 100
    vad-threshold: 500
voice-provider-packs:
    - id: local-dev-wake
      name: Local Dev Wake
      version: dev
      kind: wake-word
      transport:
        type: command
        command: /bin/sh
        args:
            - ../../examples/config/local/dev-voice-provider.sh
            - wake
            - --model
            - '{modelId}'
            - --input
            - '{inputPath}'
      capabilities:
        streaming: false
        partial-transcripts: false
        offline: true
        languages:
            - en
        input-formats:
            - audio/wav;rate=16000
      credentials: []
      wake-word:
        default-model-id: hey-jute
        phrase: Hey Jute
        languages:
            - en
        sensitivity: 0.5
        models:
            - id: hey-jute
              path: models/hey-jute.tflite
              phrase: Hey Jute
              languages:
                - en
              sensitivity: 0.5
      health-status: available
    - id: local-dev-stt
      name: Local Dev STT
      version: dev
      kind: stt
      transport:
        type: command
        command: /bin/sh
        args:
            - ../../examples/config/local/dev-voice-provider.sh
            - stt
            - --model
            - '{modelId}'
            - --input
            - '{inputPath}'
            - --language
            - '{language}'
      capabilities:
        streaming: false
        partial-transcripts: false
        offline: true
        languages:
            - en
        input-formats:
            - audio/wav;rate=16000
      credentials: []
      health-status: available
    - id: local-openwakeword
      name: Local openWakeWord
      version: dev
      kind: wake-word
      transport:
        type: command
        command: /bin/sh
        args:
            - ../../examples/config/local/openwakeword-wake.sh
            - --model
            - '{modelId}'
            - --input
            - '{inputPath}'
      capabilities:
        streaming: false
        partial-transcripts: false
        offline: true
        languages:
            - en
        input-formats:
            - audio/wav;rate=16000
      credentials: []
      wake-word:
        default-model-id: openwakeword-hey-jute
        phrase: Hey Jute
        languages:
            - en
        sensitivity: 0.5
        models:
            - id: hey_jarvis
              path: models/hey_jarvis.tflite
              phrase: hey jarvis
              languages:
                - en
              sensitivity: 0.5
            - id: openwakeword-hey-jute
              path: models/openwakeword-hey-jute.onnx
              phrase: Hey Jute
              languages:
                - en
              sensitivity: 0.5
      health-status: available
    - id: local-whisper-stt
      name: Local Whisper STT
      version: dev
      kind: stt
      transport:
        type: command
        command: /bin/sh
        args:
            - ../../examples/config/local/go-whisper-stt.sh
            - --model
            - '{modelId}'
            - --input
            - '{inputPath}'
            - --language
            - '{language}'
      capabilities:
        streaming: false
        partial-transcripts: false
        offline: true
        languages:
            - en
            - en-GB
            - en-US
        input-formats:
            - audio/wav;rate=16000
      credentials: []
      health-status: available
    - id: local-piper-tts
      name: Local Piper TTS
      version: dev
      kind: tts
      transport:
        type: command
        command: /bin/sh
        args:
            - ../../examples/config/local/piper-tts.sh
            - --voice
            - '{modelId}'
            - --language
            - '{language}'
      capabilities:
        streaming: false
        partial-transcripts: false
        offline: true
        languages:
            - en
            - en-GB
            - en-US
        input-formats:
            - text/plain
      credentials: []
      tts:
        default-voice-id: piper-default
        default-model-id: piper-default
        voices:
            - id: piper-default
              label: Piper default
              locale: en
              model-id: piper-default
      health-status: available
    - id: local-dev-tts
      name: Local Dev TTS
      version: dev
      kind: tts
      transport:
        type: command
        command: /bin/sh
        args:
            - ../../examples/config/local/dev-voice-provider.sh
            - tts
            - --voice
            - '{modelId}'
            - --language
            - '{language}'
      capabilities:
        streaming: false
        partial-transcripts: false
        offline: true
        languages:
            - en
        input-formats:
            - text/plain
      credentials: []
      tts:
        default-voice-id: amy
        default-model-id: dev-voice
        voices:
            - id: amy
              label: Amy
              locale: en
              model-id: dev-voice
      health-status: available
