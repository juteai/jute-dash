home:
  name: Jute Mock A2A Dev

server:
  listen-address: 127.0.0.1:8787

mcp:
  enabled: true
  transport: streamable-http
  listen-address: 127.0.0.1:8790
  path: /mcp
  allow-lan: false
  auth:
    mode: none
    env-token: JUTE_MCP_TOKEN

display:
  theme: system
  color-mode: system
  theme-id: jute-mono
  density: comfortable
  motion: full
  background:
    kind: theme
    value: ""
    fit: cover
    position: center
    overlay: none
    # Example configuration for a dynamic background:
    # background:
    #   kind: dynamic
    #   value: weather-ambient  # or 'stardust'
    #   fit: cover
    #   position: center
    #   overlay: none
    #   properties:
    #     speed: 0.4
    #     max-opacity: 0.25
    #     # particle-count: 50   # stardust specific
    #     # color: "--active"    # stardust specific
  widget-chrome:
    default: auto
  accent-color: neutral
  idle-mode: ambient
voice:
  enabled: false
  muted-by-default: true
  wake-word-model-id: ""
  stt-provider-id: ""
  tts-provider-id: ""
  stt-model-id: ""
  tts-model-id: ""
  tts-voice-id: ""
  preferred-agent-id: mock-a2a-agent
  cloud-opt-in: false
  command-providers-enabled: false
  sensitive-output-policy: visual_only_sensitive
  followup-window-seconds: 8
  microphone-profile: ""

agents:
  - id: mock-a2a-agent
    name: Mock A2A Agent
    description: Deterministic mock A2A 1.0 test agent with dashboard-context support.
    card-url: http://127.0.0.1:9797/.well-known/agent-card.json
    endpoint-url: http://127.0.0.1:9797/invoke
    protocol-binding: JSONRPC
    enabled: true
    capabilities:
      - conversation
      - mock-a2a
      - dashboard-context
    mcp-scopes:
      - dashboard:read
      - widgets:read
      - skills:read
      - skills:context_read
      - skills:prompt_read
      - skills:action_invoke

rooms: []
tiles: []

dashboard:
  widgets:
    - id: "date-time-widget"
      type: "date-time"
      title: "Clock"
      x: 0
      y: 0
      w: 6
      h: 1
      min-w: 3
      min-h: 1
      size: wide
      visible: true
      mode: ui
      settings:
        chrome: clear
        timezone: Europe/London
        locale: en-GB
    - id: "weather-widget"
      type: "weather"
      title: "Local Weather"
      x: 6
      y: 0
      w: 6
      h: 1
      min-w: 3
      min-h: 1
      size: wide
      visible: true
      mode: ui
      settings:
        location: "Dundee"
        latitude: 56.462
        longitude: -2.9707
        temperature-unit: "celsius"
        wind-speed-unit: "kmh"
    - id: "assistant-chat"
      type: "chat-history"
      title: "Concierge Chat"
      x: 0
      y: 1
      w: 6
      h: 2
      min-w: 3
      min-h: 1
      size: medium
      visible: true
      mode: ui
    - id: "hacker-news"
      type: "rss"
      title: "Tech News"
      x: 6
      y: 1
      w: 6
      h: 2
      min-w: 3
      min-h: 1
      size: medium
      visible: true
      mode: ui
      settings:
        limit: 5
        feeds:
          - url: "https://news.ycombinator.com/rss"
            name: "Hacker News"
    - id: "stocks-watchlist"
      type: "markets"
      title: "Markets"
      x: 0
      y: 3
      w: 6
      h: 2
      min-w: 3
      min-h: 1
      size: medium
      visible: true
      mode: ui
      settings:
        tickers:
          - "AAPL"
          - "GOOG"
          - symbol: "BTC-USD"
